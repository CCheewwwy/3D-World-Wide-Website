<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D World Wide Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
/* ------------------------------ */
/* PREMIUM UI THEME + ANIMATIONS */
/* ------------------------------ */

:root {
    --bg-dark: #020617;
    --bg-card: #0f172a;
    --accent: #4f46e5;
    --accent-soft: rgba(79, 70, 229, 0.25);
    --accent-strong: rgba(79, 70, 229, 0.6);
    --text-main: #e5e7eb;
    --text-muted: #9ca3af;
    --danger: #ef4444;
    --success: #22c55e;
}

* {
    box-sizing: border-box;
    transition: 0.2s ease;
}

body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
    color: var(--text-main);
    overflow: hidden;
}

/* ------------------------------ */
/* LOGIN SCREEN */
/* ------------------------------ */

#login-screen {
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
    background:
        radial-gradient(circle at top left, rgba(79, 70, 229, 0.35), transparent 55%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.25), transparent 55%),
        #020617;
    color: white;
    opacity: 1;
    animation: fadeIn 0.8s ease-out;
}

#login-screen.fade-out {
    animation: fadeOut 0.6s ease forwards;
}

#login-box {
    background: radial-gradient(circle at top, #111827, #020617);
    padding: 32px 30px 28px;
    border-radius: 18px;
    width: 340px;
    box-shadow:
        0 0 0 1px rgba(148, 163, 184, 0.2),
        0 24px 60px rgba(15, 23, 42, 0.9);
    animation: floatIn 0.6s ease-out;
}

#login-box.shake {
    animation: shake 0.4s ease;
}

#login-box input {
    width: 100%;
    padding: 11px 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid rgba(148, 163, 184, 0.4);
    background: rgba(15, 23, 42, 0.9);
    color: var(--text-main);
}

#login-box button {
    width: 100%;
    padding: 11px;
    margin-top: 18px;
    background: linear-gradient(135deg, #4f46e5, #22c55e);
    border: none;
    color: white;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 600;
}

/* ------------------------------ */
/* APP LAYOUT */
/* ------------------------------ */

#app {
    display: none;
    height: 100vh;
    display: flex;
    opacity: 0;
}

#app.fade-in {
    animation: fadeIn 0.8s ease forwards;
}

/* ------------------------------ */
/* SIDEBAR */
/* ------------------------------ */

#sidebar {
    width: 250px;
    background: #020617;
    color: white;
    padding: 20px 18px;
    box-shadow: 4px 0 24px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    transform: translateX(-40px);
    opacity: 0;
}

#sidebar.slide-in {
    animation: slideIn 0.6s ease forwards;
}

.nav-item {
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 10px;
    font-size: 14px;
    color: var(--text-muted);
}

.nav-item:hover {
    background: rgba(255,255,255,0.05);
    color: white;
}

.nav-item.active {
    background: rgba(255,255,255,0.1);
    color: white;
}

/* ------------------------------ */
/* CONTENT AREA */
/* ------------------------------ */

#content {
    flex: 1;
    padding: 26px;
    overflow-y: auto;
}

#content-inner {
    max-width: 1100px;
    margin: 0 auto;
    background: var(--bg-card);
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 0 0 1px rgba(31,41,55,0.9), 0 24px 60px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(20px);
}

#content-inner.fade-up {
    animation: fadeUp 0.6s ease forwards;
}

/* ------------------------------ */
/* ORDER CARDS */
/* ------------------------------ */

.order-list {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.order-card {
    background: rgba(15, 23, 42, 0.95);
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow:
        0 0 0 1px rgba(31,41,55,0.8),
        0 12px 30px rgba(0,0,0,0.4);
    cursor: pointer;
    overflow: hidden;
}

.order-card:hover {
    background: rgba(15, 23, 42, 1);
    transform: translateY(-2px);
}

.order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.order-name {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
}

.order-sub {
    margin: 2px 0 0;
    font-size: 13px;
    color: #9ca3af;
    display: flex;
    align-items: center;
    gap: 6px;
}

.order-body {
    margin-top: 14px;
    font-size: 14px;
    line-height: 1.45;
    color: #d1d5db;
    display: none;
    opacity: 0;
    transform: translateY(10px);
}

.order-body.open {
    display: block;
    animation: expand 0.35s ease forwards;
}

.order-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
}

.order-actions {
    margin-top: 14px;
    display: flex;
    gap: 8px;
}

/* Status badges */
.status-badge {
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
}

.status-active {
    background: rgba(59,130,246,0.15);
    color: #60a5fa;
}

.status-completed {
    background: rgba(16,185,129,0.15);
    color: #6ee7b7;
}

.status-delivered {
    background: rgba(234,179,8,0.15);
    color: #facc15;
}

/* Buttons */
.btn-small {
    padding: 6px 10px;
    font-size: 11px;
    border-radius: 999px;
    cursor: pointer;
    border: none;
}

.btn-complete {
    background: rgba(16,185,129,0.15);
    color: #6ee7b7;
}

.btn-deliver {
    background: rgba(234,179,8,0.15);
    color: #fde68a;
}

.btn-delete {
    background: rgba(239,68,68,0.15);
    color: #fca5a5;
}

.btn-delete:hover {
    background: rgba(239,68,68,0.25);
}

/* ------------------------------ */
/* ANIMATIONS */
/* ------------------------------ */

@keyframes floatIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
    from { opacity: 0; transform: translateX(-40px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes expand {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-6px); }
    100% { transform: translateX(0); }
}
</style>
</head>
<body>

<!-- ------------------------------ -->
<!-- LOGIN SCREEN -->
<!-- ------------------------------ -->

<div id="login-screen">
    <div id="login-box">
        <h2>3D World Wide Admin</h2>
        <p style="color:#9ca3af;margin-bottom:10px;">Secure access to your dashboard</p>

        <input id="login-email" type="email" placeholder="Admin email">
        <input id="login-password" type="password" placeholder="Password">

        <button onclick="login()">Sign in</button>

        <p id="login-error" style="color:#22c55e;font-size:12px;"></p>
    </div>
</div>

<!-- ------------------------------ -->
<!-- APP -->
<!-- ------------------------------ -->

<div id="app">
    <div id="sidebar">
        <h3>3D Admin</h3>
        <p id="sidebar-user-email" style="font-size:12px;color:#9ca3af;margin-top:-10px;margin-bottom:20px;"></p>

        <div class="nav-item active" data-page="active" onclick="showPage('active', this)">Active Orders</div>
        <div class="nav-item" data-page="create" onclick="showPage('create', this)">Create Order</div>
        <div class="nav-item" data-page="completed" onclick="showPage('completed', this)">Completed Orders</div>
        <div class="nav-item" data-page="delivered" onclick="showPage('delivered', this)">Delivered Orders</div>

        <div style="flex:1;"></div>

        <div class="nav-item" onclick="logout()">Logout</div>
    </div>

    <div id="content">
        <div id="content-inner"></div>
    </div>
</div>
<script>
/* ------------------------------ */
/* ICONS */
/* ------------------------------ */

const icons = {
    user: `<svg width="16" height="16" fill="#60a5fa"><path d="M8 9a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-3.33 0-6 1.34-6 3v1h12v-1c0-1.66-2.67-3-6-3Z"/></svg>`,
    material: `<svg width="16" height="16" fill="#a78bfa"><path d="M2 6l6-4 6 4-6 4-6-4Zm0 4l6 4 6-4"/></svg>`,
    color: `<svg width="16" height="16" fill="#f472b6"><circle cx="8" cy="8" r="6"/></svg>`,
    qty: `<svg width="16" height="16" fill="#34d399"><path d="M3 3h10v2H3Zm0 4h10v2H3Zm0 4h10v2H3Z"/></svg>`,
    priority: `<svg width="16" height="16" fill="#facc15"><path d="M8 2l6 12H2Z"/></svg>`,
    notes: `<svg width="16" height="16" fill="#93c5fd"><path d="M3 2h10v12H3Zm2 3h6v2H5Zm0 4h6v2H5Z"/></svg>`,
    phone: `<svg width="16" height="16" fill="#4ade80"><path d="M4 2h3l1 3-2 1a9 9 0 0 0 4 4l1-2 3 1v3c0 1-1 2-2 2A12 12 0 0 1 2 4c0-1 1-2 2-2Z"/></svg>`,
    email: `<svg width="16" height="16" fill="#38bdf8"><path d="M2 4h12v8H2Zm6 4L2 4h12Z"/></svg>`
};

/* ------------------------------ */
/* SUPABASE INIT */
/* ------------------------------ */

const sb = window.supabase.createClient(
    "https://tottpqebhmuaemnngvrz.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdHRwcWViaG11YWVtbm5ndnJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjA4NDAsImV4cCI6MjA5MzIzNjg0MH0.T4tjFt-_QcGlZtA4cfdQDmujWXBA8r9Z4SqeGpJ02hU"
);

/* ------------------------------ */
/* LOGIN */
/* ------------------------------ */

async function login() {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
        document.getElementById("login-error").style.color = "#ef4444";
        document.getElementById("login-error").innerText = "Invalid email or password.";

        document.getElementById("login-box").classList.add("shake");
        setTimeout(() => {
            document.getElementById("login-box").classList.remove("shake");
        }, 400);

        return;
    }

    document.getElementById("login-error").style.color = "#22c55e";
    document.getElementById("login-error").innerText = `Welcome, ${email}`;

    document.getElementById("login-screen").classList.add("fade-out");

    setTimeout(() => {
        loadApp();
    }, 700);
}

async function logout() {
    await sb.auth.signOut();
    location.reload();
}

sb.auth.getSession().then(({ data }) => {
    if (data.session) loadApp();
});

/* ------------------------------ */
/* LOAD APP */
/* ------------------------------ */

async function loadApp() {
    document.getElementById("login-screen").style.display = "none";

    const app = document.getElementById("app");
    app.style.display = "flex";
    app.classList.add("fade-in");

    document.getElementById("sidebar").classList.add("slide-in");

    const { data } = await sb.auth.getUser();
    if (data?.user?.email) {
        document.getElementById("sidebar-user-email").innerText = data.user.email;
    }

    showPage("active");
}

/* ------------------------------ */
/* NAVIGATION */
/* ------------------------------ */

function showPage(page, el) {
    document.querySelectorAll(".nav-item[data-page]").forEach(x => x.classList.remove("active"));
    if (el) el.classList.add("active");

    if (page === "create") renderCreateOrder();
    if (page === "active") loadOrders("Active");
    if (page === "completed") loadOrders("Completed");
    if (page === "delivered") loadOrders("Delivered");
}

/* ------------------------------ */
/* CONTENT WRAPPER */
/* ------------------------------ */

function setContent(title, html) {
    const content = document.getElementById("content-inner");
    content.style.opacity = 0;
