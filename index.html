<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D World Wide | Pro Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #05070a;
            --bg-sidebar: #0a0f18;
            --accent-primary: #8b5cf6;
            --glass: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        #app { display: none; height: 100vh; flex-direction: row; }
        #sidebar { width: 260px; background: var(--bg-sidebar); padding: 40px 24px; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; }
        #content { flex: 1; padding: 40px; overflow-y: auto; }
        #content-inner { max-width: 1100px; margin: 0 auto; }

        .nav-brand { font-weight: 800; font-size: 18px; margin-bottom: 40px; background: linear-gradient(to right, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-item { padding: 12px 16px; cursor: pointer; border-radius: 12px; color: var(--text-muted); margin-bottom: 6px; font-size: 14px; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { background: rgba(139, 92, 246, 0.1); color: var(--accent-primary); border: 1px solid rgba(139, 92, 246, 0.2); }

        .order-card { background: var(--glass); backdrop-filter: blur(16px); border-radius: 16px; margin-bottom: 16px; border: 1px solid var(--glass-border); overflow: hidden; }
        .card-main { padding: 20px 24px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 0.5fr; align-items: center; gap: 15px; cursor: pointer; }
        .card-details { max-height: 0; overflow: hidden; background: rgba(0,0,0,0.2); transition: max-height 0.3s ease-out; }
        .card-details.open { max-height: 1200px; padding: 24px; border-top: 1px solid var(--glass-border); }

        .info-group label { display: block; font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 0.5px; }
        .info-group span { font-weight: 600; font-size: 14px; color: #fff; }
        
        input, select, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; margin-top: 5px; outline: none; }
        input:focus { border-color: var(--accent-primary); }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .rush-badge { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .pay-badge { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }

        .btn-prime { background: var(--accent-primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-success { background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
        .action-area { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-sub { background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .btn-sub:hover { border-color: var(--danger); color: var(--danger); }

        @media (max-width: 768px) {
            #app { flex-direction: column; }
            #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; flex-direction: row; padding: 10px; border-top: 1px solid var(--glass-border); justify-content: space-around; z-index: 1000; background: var(--bg-sidebar); }
            .nav-brand, .nav-item p { display: none; }
            #content { padding: 20px; padding-bottom: 90px; }
            .card-main { grid-template-columns: 1fr 1fr; gap: 10px; }
            .hide-mobile { display: none; }
            .grid-2, .grid-3 { grid-template-columns: 1fr !important; }
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="login-screen" style="display:flex; height:100vh; align-items:center; justify-content:center; background:#020617;">
    <div style="background:var(--glass); border:1px solid var(--glass-border); padding:40px; border-radius:24px; width:90%; max-width:380px; text-align:center; backdrop-filter:blur(20px);">
        <h2 style="margin:0 0 24px 0;">3D Terminal</h2>
        <input id="login-email" type="email" placeholder="Admin Email">
        <input id="login-password" type="password" placeholder="Password">
        <button onclick="login()" class="btn-prime" style="width:100%; margin-top:20px;">Initialize</button>
        <p id="login-error" style="color:var(--danger); font-size:12px; margin-top:15px;"></p>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <div class="nav-brand">3D WORLD WIDE</div>
        <div class="nav-item active" onclick="showPage('active', this)"><span>✦</span><p style="margin:0">Active</p></div>
        <div class="nav-item" onclick="showPage('create', this)"><span>✚</span><p style="margin:0">New Order</p></div>
        <div class="nav-item" onclick="showPage('completed', this)"><span>✔</span><p style="margin:0">Done</p></div>
        <div class="nav-item" onclick="showPage('delivered', this)"><span>🚚</span><p style="margin:0">Delivered</p></div>
        <div style="flex:1"></div>
        <div class="nav-item" onclick="logout()" style="color:var(--danger)"><span>⎋</span><p style="margin:0">Sign Out</p></div>
    </div>
    <div id="content"><div id="content-inner"></div></div>
</div>

<script>
    const sb = window.supabase.createClient(
        "https://tottpqebhmuaemnngvrz.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdHRwcWViaG11YWVtbm5ndnJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjA4NDAsImV4cCI6MjA5MzIzNjg0MH0.T4tjFt-_QcGlZtA4cfdQDmujWXBA8r9Z4SqeGpJ02hU"
    );

    async function login() {
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) document.getElementById("login-error").innerText = error.message;
        else loadApp();
    }

    function loadApp() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        showPage('active');
    }

    async function loadOrders(status) {
        const { data } = await sb.from("orders").select("*").eq("status", status).order("created_at", { ascending: false });
        let html = `<h2>${status} Orders</h2>`;
        
        if (!data || data.length === 0) {
            html += `<div style="text-align:center; padding:80px; color:var(--text-muted)">No orders in this sector.</div>`;
        } else {
            data.forEach(o => {
                const rushTag = o.rush ? `<span class="badge rush-badge">RUSH</span>` : '';
                const payTag = o.payment_needed ? `<span class="badge pay-badge">UNPAID</span>` : '';
                
                html += `
                <div class="order-card">
                    <div class="card-main" onclick="this.nextElementSibling.classList.toggle('open')">
                        <div class="info-group">
                            <label>Client & ID</label>
                            <span>${o.customer_name} <small style="color:var(--accent-primary); font-family:monospace;">#${o.order_id}</small></span>
                        </div>
                        <div class="info-group hide-mobile">
                            <label>Item</label>
                            <span>${o.item_name || 'Generic'}</span>
                        </div>
                        <div class="info-group hide-mobile">
                            <label>Priority</label>
                            <span style="color:${o.priority === 'High' ? 'var(--danger)' : 'white'}">${o.priority || 'Normal'}</span>
                        </div>
                        <div class="info-group hide-mobile">
                            <label>Price</label>
                            <span style="color:var(--success)">$${o.cost}</span>
                        </div>
                        <div style="text-align:right">
                            ${rushTag} ${payTag}
                        </div>
                    </div>
                    <div class="card-details">
                        <div class="grid-3">
                            <div class="info-group"><label>Email</label><span>${o.customer_email}</span></div>
                            <div class="info-group"><label>Phone</label><span>${o.phone}</span></div>
                            <div class="info-group"><label>Quantity</label><span>${o.quantity || 1}</span></div>
                        </div>
                        <div class="grid-3">
                            <div class="info-group"><label>Print Type</label><span>${o.print_type || 'FDM'}</span></div>
                            <div class="info-group"><label>Material</label><span>${o.material}</span></div>
                            <div class="info-group"><label>Color</label><span>${o.color}</span></div>
                        </div>
                        <div style="margin-top:15px;">
                            <label style="font-size:10px; color:var(--text-muted);">NOTES</label>
                            <p style="font-size:13px; margin:5px 0;">${o.notes || 'No internal notes.'}</p>
                        </div>
                        <div class="action-area">
                            ${status === 'Active' ? `<button class="btn-prime" style="flex:1;" onclick="updateStatus('${o.id}', 'Completed')">Mark Done</button>` : ''}
                            ${status === 'Completed' ? `<button class="btn-prime" style="flex:1;" onclick="updateStatus('${o.id}', 'Delivered')">Ship Order</button>` : ''}
                            ${o.payment_needed ? `<button class="btn-success" onclick="markPaid('${o.id}')">Mark Paid</button>` : ''}
                            <button class="btn-sub" onclick="deleteOrder('${o.id}')">Delete</button>
                        </div>
                    </div>
                </div>`;
            });
        }
        document.getElementById("content-inner").innerHTML = html;
    }

    function renderCreateOrder() {
        document.getElementById("content-inner").innerHTML = `
            <h2>New Order Entry</h2>
            <div style="background:var(--glass); padding:30px; border-radius:20px; border:1px solid var(--glass-border);">
                <div class="grid-2">
                    <div class="info-group"><label>Item Name</label><input id="item_name"></div>
                    <div class="info-group"><label>Customer Name</label><input id="name"></div>
                </div>
                <div class="grid-3">
                    <div class="info-group"><label>Email</label><input id="email"></div>
                    <div class="info-group"><label>Phone</label><input id="phone"></div>
                    <div class="info-group"><label>Order ID (Numeric)</label><input id="order_id" type="number"></div>
                </div>
                <div class="grid-3">
                    <div class="info-group"><label>Print Type</label><input id="print_type"></div>
                    <div class="info-group"><label>Material</label><input id="material"></div>
                    <div class="info-group"><label>Color</label><input id="color"></div>
                </div>
                <div class="grid-3">
                    <div class="info-group"><label>Quantity</label><input id="quantity" type="number" value="1"></div>
                    <div class="info-group"><label>Priority</label>
                        <select id="priority">
                            <option value="Normal">Normal</option>
                            <option value="High">High</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="info-group"><label>Cost ($)</label><input id="cost" type="number" step="0.01"></div>
                </div>
                <div class="grid-2">
                    <div class="info-group"><label>Rush Order?</label><select id="rush"><option value="false">No</option><option value="true">Yes</option></select></div>
                    <div class="info-group"><label>Payment Needed?</label><select id="payment_needed"><option value="true">Yes</option><option value="false">No</option></select></div>
                </div>
                <div class="info-group"><label>Notes</label><textarea id="notes" rows="3"></textarea></div>
                <button onclick="createOrder()" class="btn-prime" style="width:100%; margin-top:20px;">Create Order</button>
            </div>`;
    }

    async function createOrder() {
        const order = {
            item_name: document.getElementById("item_name").value,
            customer_name: document.getElementById("name").value,
            customer_email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            order_id: parseInt(document.getElementById("order_id").value),
            print_type: document.getElementById("print_type").value,
            material: document.getElementById("material").value,
            color: document.getElementById("color").value,
            quantity: document.getElementById("quantity").value,
            priority: document.getElementById("priority").value,
            cost: parseFloat(document.getElementById("cost").value) || 0,
            rush: document.getElementById("rush").value === "true",
            payment_needed: document.getElementById("payment_needed").value === "true",
            notes: document.getElementById("notes").value,
            status: "Active"
        };
        await sb.from("orders").insert(order);
        showPage('active');
    }

    async function markPaid(id) {
        await sb.from("orders").update({ payment_needed: false }).eq("id", id);
        location.reload(); 
    }

    async function updateStatus(id, newStatus) {
        const updateData = { status: newStatus };
        if (newStatus === 'Delivered') updateData.delivered_at = new Date().toISOString();
        await sb.from("orders").update(updateData).eq("id", id);
        showPage(newStatus.toLowerCase());
    }

    async function deleteOrder(id) {
        if(confirm("Permanently delete this order record?")) { 
            await sb.from("orders").delete().eq("id", id); 
            showPage('active'); 
        }
    }

    function showPage(page, el) {
        if (el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if (page === 'create') renderCreateOrder();
        else loadOrders(page.charAt(0).toUpperCase() + page.slice(1));
    }

    async function logout() { await sb.auth.signOut(); location.reload(); }
    sb.auth.getSession().then(({data:{session}}) => { if(session) loadApp(); });
</script>
</body>
</html>
