<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D World Wide | Admin Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #05070a;
            --bg-sidebar: #0a0f18;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --glass: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; transition: all 0.25s ease; font-family: 'Inter', sans-serif; }

        body {
            margin: 0; background: var(--bg-dark); color: var(--text-main);
            height: 100vh; overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
        }

        /* --- Modern App Layout --- */
        #app { display: none; height: 100vh; }

        #sidebar { 
            width: 260px; background: var(--bg-sidebar); padding: 40px 24px;
            border-right: 1px solid var(--glass-border); display: flex; flex-direction: column;
        }

        .nav-brand {
            font-weight: 800; font-size: 18px; letter-spacing: -0.5px; margin-bottom: 48px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-item { 
            padding: 12px 16px; cursor: pointer; border-radius: 12px; 
            color: var(--text-muted); margin-bottom: 6px; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 12px;
        }

        .nav-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .nav-item.active { background: rgba(139, 92, 246, 0.1); color: var(--accent-primary); border: 1px solid rgba(139, 92, 246, 0.2); }

        #content { flex: 1; padding: 48px; overflow-y: auto; background: transparent; }
        #content-inner { max-width: 1100px; margin: 0 auto; }

        h2 { font-weight: 700; font-size: 28px; letter-spacing: -0.02em; margin-bottom: 32px; }

        /* --- Organized Order Cards --- */
        .order-card { 
            background: var(--glass); backdrop-filter: blur(16px);
            border-radius: 16px; padding: 0; margin-bottom: 16px; 
            border: 1px solid var(--glass-border); overflow: hidden;
        }

        .order-card:hover { border-color: rgba(139, 92, 246, 0.4); transform: translateY(-2px); }

        .card-main { padding: 24px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; align-items: center; gap: 20px; cursor: pointer; }

        .info-group label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px; }
        .info-group span { font-weight: 600; font-size: 14px; display: block; }

        .id-badge { font-family: monospace; font-size: 11px; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; color: var(--accent-primary); }

        .card-details { 
            max-height: 0; overflow: hidden; background: rgba(0,0,0,0.2);
            border-top: 0 solid var(--glass-border);
        }
        .card-details.open { max-height: 500px; padding: 24px; border-top-width: 1px; }

        /* --- Utilities --- */
        .btn-prime { background: var(--accent-primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-outline:hover { color: var(--danger); border-color: var(--danger); }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            #app { flex-direction: column; }
            #sidebar { 
                position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
                flex-direction: row; padding: 0 10px; border-top: 1px solid var(--glass-border);
                justify-content: space-around; align-items: center; z-index: 1000;
            }
            .nav-brand, .sidebar-user, .nav-item p { display: none; }
            .nav-item { flex-direction: column; padding: 10px; margin: 0; }
            #content { padding: 20px 20px 100px 20px; }
            .card-main { grid-template-columns: 1fr auto; gap: 10px; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<div id="login-screen" style="display:flex; height:100vh; align-items:center; justify-content:center;">
    <div style="background:var(--glass); border:1px solid var(--glass-border); padding:40px; border-radius:24px; width:100%; max-width:380px; text-align:center; backdrop-filter:blur(20px);">
        <h2 style="margin-top:0">Welcome Back</h2>
        <input id="login-email" type="email" placeholder="Email" style="width:100%; padding:14px; margin-bottom:12px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); border-radius:12px; color:white;">
        <input id="login-password" type="password" placeholder="Password" style="width:100%; padding:14px; margin-bottom:24px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); border-radius:12px; color:white;">
        <button onclick="login()" class="btn-prime" style="width:100%; padding:14px;">Access Terminal</button>
        <p id="login-error" style="color:var(--danger); font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <div class="nav-brand">3D WORLD WIDE</div>
        <div class="nav-item active" onclick="showPage('active', this)"><span>✦</span><p style="margin:0">Active Queue</p></div>
        <div class="nav-item" onclick="showPage('create', this)"><span>✚</span><p style="margin:0">New Project</p></div>
        <div class="nav-item" onclick="showPage('completed', this)"><span>✔</span><p style="margin:0">Completed</p></div>
        <div class="nav-item" onclick="showPage('delivered', this)"><span>📦</span><p style="margin:0">Delivered</p></div>
        
        <div style="flex:1"></div>
        <div class="nav-item" onclick="logout()" style="color:var(--danger)"><span>⎋</span><p style="margin:0">Sign Out</p></div>
    </div>
    
    <div id="content">
        <div id="content-inner"></div>
    </div>
</div>

<script>
    const sb = window.supabase.createClient(
        "https://tottpqebhmuaemnngvrz.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdHRwcWViaG11YWVtbm5ndnJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjA4NDAsImV4cCI6MjA5MzIzNjg0MH0.T4tjFt-_QcGlZtA4cfdQDmujWXBA8r9Z4SqeGpJ02hU"
    );

    async function login() {
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) document.getElementById("login-error").innerText = error.message;
        else loadApp();
    }

    function loadApp() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        showPage('active');
    }

    async function loadOrders(status) {
        const { data } = await sb.from("orders").select("*").eq("status", status).order("created_at", { ascending: false });
        let html = `<h2>${status} Orders</h2>`;
        
        if (!data || data.length === 0) {
            html += `<div style="text-align:center; padding:100px 0; color:var(--text-muted)">Terminal is empty</div>`;
        } else {
            data.forEach(o => {
                html += `
                <div class="order-card">
                    <div class="card-main" onclick="this.nextElementSibling.classList.toggle('open')">
                        <div class="info-group">
                            <label>Client</label>
                            <span>${o.customer_name} <span class="id-badge">#${o.order_id}</span></span>
                        </div>
                        <div class="info-group hide-mobile">
                            <label>Product</label>
                            <span>${o.item_name || 'Generic Print'}</span>
                        </div>
                        <div class="info-group hide-mobile">
                            <label>Specs</label>
                            <span>${o.material} • ${o.color}</span>
                        </div>
                        <div style="text-align:right">
                            <span style="color:var(--success); font-weight:700">$${o.cost}</span>
                        </div>
                    </div>
                    <div class="card-details">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px; margin-bottom:24px;">
                            <div>
                                <label style="font-size:10px; color:var(--text-muted); display:block; margin-bottom:8px;">CONTACT INFO</label>
                                <div style="font-size:13px;">${o.customer_email}</div>
                                <div style="font-size:13px;">${o.phone}</div>
                            </div>
                            <div>
                                <label style="font-size:10px; color:var(--text-muted); display:block; margin-bottom:8px;">INTERNAL NOTES</label>
                                <div style="font-size:13px;">${o.notes || 'No notes provided'}</div>
                            </div>
                        </div>
                        <div style="display:flex; gap:12px;">
                            ${status === 'Active' ? `<button class="btn-prime" onclick="updateStatus('${o.id}', 'Completed')">Complete Order</button>` : ''}
                            ${status === 'Completed' ? `<button class="btn-prime" onclick="updateStatus('${o.id}', 'Delivered')">Ship Order</button>` : ''}
                            <button class="btn-outline" onclick="deleteOrder('${o.id}')">Remove</button>
                        </div>
                    </div>
                </div>`;
            });
        }
        document.getElementById("content-inner").innerHTML = html;
    }

    function renderCreateOrder() {
        document.getElementById("content-inner").innerHTML = `
            <h2>Initialize New Order</h2>
            <div style="background:var(--glass); padding:32px; border-radius:24px; border:1px solid var(--glass-border);">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div class="info-group"><label>Order Item</label><input id="item_name" style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;"></div>
                    <div class="info-group"><label>Customer Name</label><input id="name" style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;"></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                    <div class="info-group"><label>Email</label><input id="email" style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;"></div>
                    <div class="info-group"><label>Cost ($)</label><input id="cost" type="number" style="width:100%; padding:12px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); border-radius:8px; color:white;"></div>
                </div>
                <button onclick="createOrder()" class="btn-prime" style="margin-top:32px; width:100%;">Create Entry</button>
            </div>`;
    }

    async function createOrder() {
        const order = {
            order_id: Math.floor(100000 + Math.random() * 900000),
            item_name: document.getElementById("item_name").value,
            customer_name: document.getElementById("name").value,
            customer_email: document.getElementById("email").value,
            cost: parseFloat(document.getElementById("cost").value) || 0,
            status: "Active"
        };
        await sb.from("orders").insert(order);
        showPage('active');
    }

    async function updateStatus(id, newStatus) {
        await sb.from("orders").update({ status: newStatus }).eq("id", id);
        showPage(newStatus.toLowerCase());
    }

    async function deleteOrder(id) {
        if(confirm("Confirm Deletion?")) { 
            await sb.from("orders").delete().eq("id", id); 
            showPage('active'); 
        }
    }

    function showPage(page, el) {
        if (el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if (page === 'create') renderCreateOrder();
        else loadOrders(page.charAt(0).toUpperCase() + page.slice(1));
    }

    async function logout() { await sb.auth.signOut(); location.reload(); }
    
    // Check session on load
    sb.auth.getSession().then(({data:{session}}) => { if(session) loadApp(); });
</script>
</body>
</html>
