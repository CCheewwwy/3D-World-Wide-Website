<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D World Wide Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        :root {
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --accent: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #4f46e5, #22c55e);
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --success: #22c55e;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: 0.2s ease; }

        body {
            margin: 0; font-family: "Inter", sans-serif;
            background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
            color: var(--text-main); height: 100vh; overflow: hidden;
        }

        /* --- UI COMPONENTS --- */
        #login-screen { display: flex; height: 100vh; align-items: center; justify-content: center; }
        #login-box { background: #111827; padding: 35px; border-radius: 18px; width: 360px; text-align: center; border: 1px solid var(--border); }
        
        input, select, textarea { width: 100%; padding: 12px; margin-top: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(15, 23, 42, 0.8); color: white; outline: none; }
        
        button { width: 100%; padding: 12px; margin-top: 20px; background: var(--accent-gradient); border: none; color: white; border-radius: 30px; cursor: pointer; font-weight: 600; }

        #app { display: none; height: 100vh; }
        #sidebar { width: 260px; background: #020617; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 10px; color: var(--text-muted); margin-bottom: 5px; }
        .nav-item.active { background: rgba(255, 255, 255, 0.08); color: white; }

        #content { flex: 1; padding: 40px; overflow-y: auto; }
        #content-inner { max-width: 900px; margin: 0 auto; }

        .order-card { background: var(--bg-card); border-radius: 14px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); cursor: pointer; }
        .order-body { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); font-size: 14px; }
        .order-body.open { display: block; }

        .id-pill { background: rgba(79, 70, 229, 0.15); color: #818cf8; padding: 2px 8px; border-radius: 6px; font-weight: bold; cursor: copy; border: 1px solid rgba(79, 70, 229, 0.3); }
        
        .btn-action { width: auto; margin-top: 0; margin-right: 8px; padding: 6px 14px; font-size: 12px; display: inline-block; border-radius: 6px; }
        .btn-email { background: #3b82f6; color: white; text-decoration: none; display: inline-block; }

        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--success); color: white; padding: 10px 20px; border-radius: 8px; transform: translateY(100px); transition: 0.3s; z-index: 1000; }
    </style>
</head>
<body>

<div id="toast">Copied to Clipboard!</div>

<div id="login-screen">
    <div id="login-box">
        <h2>3D Admin</h2>
        <input id="login-email" type="email" placeholder="Admin email">
        <input id="login-password" type="password" placeholder="Password">
        <button onclick="login()">Sign in</button>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <h3>3D World Wide</h3>
        <div class="nav-item active" onclick="showPage('active', this)">Active Orders</div>
        <div class="nav-item" onclick="showPage('create', this)">Create New Order</div>
        <div class="nav-item" onclick="showPage('completed', this)">Completed</div>
        <div class="nav-item" onclick="showPage('delivered', this)">Delivered</div>
        <div style="flex:1;"></div>
        <div class="nav-item" onclick="logout()" style="color:var(--danger);">Logout</div>
    </div>
    <div id="content"><div id="content-inner"></div></div>
</div>

<script>
    const sb = window.supabase.createClient(
        "https://tottpqebhmuaemnngvrz.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdHRwcWViaG11YWVtbm5ndnJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjA4NDAsImV4cCI6MjA5MzIzNjg0MH0.T4tjFt-_QcGlZtA4cfdQDmujWXBA8r9Z4SqeGpJ02hU"
    );

    async function login() {
        const { error } = await sb.auth.signInWithPassword({
            email: document.getElementById("login-email").value,
            password: document.getElementById("login-password").value
        });
        if (error) alert("Login failed"); else loadApp();
    }

    function loadApp() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        showPage('active');
    }

    function showPage(page, el) {
        if (el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        if (page === 'create') renderCreateOrder();
        else loadOrders(page.charAt(0).toUpperCase() + page.slice(1));
    }

    function copyID(e, id) {
        e.stopPropagation();
        navigator.clipboard.writeText(id);
        const toast = document.getElementById("toast");
        toast.style.transform = "translateY(0)";
        setTimeout(() => { toast.style.transform = "translateY(100px)"; }, 2000);
    }

    // --- NEW EMAIL GENERATOR ---
    function sendThankYouEmail(e, email, orderID, itemName) {
        e.stopPropagation();
        const subject = encodeURIComponent(`Your 3D World Wide Order: ${itemName}`);
        const body = encodeURIComponent(
`Thank you for shopping with 3D World Wide!

Your order for "${itemName}" has been placed, and will arrive as soon as possible.

To track your order progress, visit: 3dworldwide.vercel.app/customer
Your Order ID: ${orderID}

(You can copy and paste this ID into the tracking page to see real-time updates.)

Best regards,
3D World Wide Team`
        );
        window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
    }

    async function loadOrders(status) {
        const { data } = await sb.from("orders").select("*").eq("status", status).order("created_at", { ascending: false });
        let html = `<h2>${status} Orders</h2>`;
        data?.forEach(o => {
            html += `
                <div class="order-card" onclick="this.querySelector('.order-body').classList.toggle('open')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <strong style="font-size:18px;">${o.item_name}</strong><br>
                            <span style="font-size:13px; color:var(--text-muted)">
                                ID: <span class="id-pill" onclick="copyID(event, '${o.order_id}')">#${o.order_id} 📋</span> 
                                | ${o.customer_name}
                            </span>
                        </div>
                        <button class="btn-action btn-email" onclick="sendThankYouEmail(event, '${o.customer_email}', '${o.order_id}', '${o.item_name}')">✉️ Send Email</button>
                    </div>
                    <div class="order-body">
                        <p><strong>Email:</strong> ${o.customer_email} | <strong>Material:</strong> ${o.material}</p>
                        <p><strong>Notes:</strong> ${o.notes || 'N/A'}</p>
                        <div style="margin-top:10px;">
                            <button class="btn-action" style="background:var(--success); color:white;" onclick="event.stopPropagation(); updateStatus('${o.id}', 'Completed')">Complete</button>
                            <button class="btn-action" style="background:var(--danger); color:white;" onclick="event.stopPropagation(); deleteOrder('${o.id}')">Delete</button>
                        </div>
                    </div>
                </div>`;
        });
        document.getElementById("content-inner").innerHTML = html;
    }

    function renderCreateOrder() {
        document.getElementById("content-inner").innerHTML = `
            <h2>Create New Order</h2>
            <div style="background: var(--bg-card); padding: 25px; border-radius: 14px; border: 1px solid var(--border);">
                <input id="item_name" placeholder="Item Name">
                <input id="name" placeholder="Customer Name">
                <input id="email" placeholder="Customer Email">
                <input id="cost" type="number" step="0.01" placeholder="Cost ($)">
                <input id="material" placeholder="Material">
                <input id="color" placeholder="Color">
                <textarea id="notes" placeholder="Notes..."></textarea>
                <button onclick="createOrder()">Submit Order</button>
            </div>`;
    }

    async function createOrder() {
        const generatedId = Math.floor(100000 + Math.random() * 900000);
        const order = {
            order_id: generatedId,
            item_name: document.getElementById("item_name").value,
            customer_name: document.getElementById("name").value,
            customer_email: document.getElementById("email").value,
            cost: parseFloat(document.getElementById("cost").value) || 0,
            material: document.getElementById("material").value,
            color: document.getElementById("color").value,
            status: "Active"
        };
        await sb.from("orders").insert(order);
        showPage('active');
    }

    async function updateStatus(id, newStatus) {
        await sb.from("orders").update({ status: newStatus }).eq("id", id);
        showPage('active');
    }

    async function deleteOrder(id) {
        if(confirm("Delete?")) { await sb.from("orders").delete().eq("id", id); showPage('active'); }
    }

    function logout() { sb.auth.signOut(); location.reload(); }
    sb.auth.getSession().then(({ data }) => { if (data.session) loadApp(); });
</script>
</body>
</html>
