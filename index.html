<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D World Wide | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #020617;
            --bg-sidebar: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.5);
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --border: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: var(--text-main); height: 100vh; overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
        }

        /* --- Login Screen (Responsive) --- */
        #login-screen { display: flex; height: 100vh; align-items: center; justify-content: center; padding: 20px; }
        #login-box { 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; 
            text-align: center; border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        input, select, textarea { 
            width: 100%; padding: 14px; margin-top: 12px; border-radius: 12px; 
            border: 1px solid var(--border); background: rgba(2, 6, 23, 0.5); 
            color: white; outline: none; font-size: 16px; /* 16px prevents iOS zoom on focus */
        }
        
        button { 
            width: 100%; padding: 14px; margin-top: 24px; background: var(--accent-gradient); 
            border: none; color: white; border-radius: 12px; cursor: pointer; 
            font-weight: 700; letter-spacing: 0.5px;
        }

        /* --- App Layout --- */
        #app { display: none; height: 100vh; flex-direction: row; }

        /* Sidebar Styling (Desktop/iPad) */
        #sidebar { 
            width: 280px; background: var(--bg-sidebar); padding: 30px 20px; 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; 
            z-index: 100;
        }
        .nav-item { 
            padding: 14px 18px; cursor: pointer; border-radius: 12px; 
            color: var(--text-muted); margin-bottom: 8px; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 12px;
        }
        .nav-item.active { background: var(--accent); color: white; }

        #content { flex: 1; padding: 40px; overflow-y: auto; padding-bottom: 100px; }
        #content-inner { max-width: 1000px; margin: 0 auto; }

        /* --- Responsive Logic --- */

        /* Mobile Phones (iPhone) */
        @media (max-width: 768px) {
            #app { flex-direction: column; }
            
            #sidebar { 
                position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
                flex-direction: row; padding: 5px 10px; border-right: none;
                border-top: 1px solid var(--border); justify-content: space-around;
                background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            }

            #sidebar h2, #sidebar-user-email, .logout-text, .sidebar-spacer { display: none; }

            .nav-item { 
                flex-direction: column; gap: 4px; padding: 8px; margin-bottom: 0;
                font-size: 10px; flex: 1; justify-content: center;
            }
            .nav-item span { font-size: 20px; }
            
            #content { padding: 20px; padding-bottom: 90px; }
            h2 { font-size: 22px; margin-bottom: 20px; }
            
            .grid-2 { grid-template-columns: 1fr; } /* Stack inputs on mobile */
            .order-header { flex-direction: column; gap: 10px; }
            
            .btn-action { width: 100%; margin-bottom: 8px; margin-right: 0; padding: 12px; }
            .order-card { padding: 16px; }
        }

        /* Tablets (iPad) */
        @media (min-width: 769px) and (max-width: 1024px) {
            #sidebar { width: 220px; }
            #content { padding: 30px; }
        }

        /* --- Order Cards & UI --- */
        .order-card { 
            background: var(--bg-card); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 24px; margin-bottom: 20px; 
            border: 1px solid var(--border);
        }
        .order-body { max-height: 0; overflow: hidden; opacity: 0; }
        .order-body.open { max-height: 1000px; opacity: 1; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

        .id-pill { background: rgba(255,255,255,0.05); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-family: monospace; }
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .pay-needed { background: rgba(244, 63, 94, 0.1); color: var(--danger); }
        .pay-ok { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        #toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--accent); color: white; padding: 12px 24px; border-radius: 50px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); font-weight: 600; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="toast">Copied to Clipboard!</div>

<div id="login-screen">
    <div id="login-box">
        <div style="font-size: 32px; margin-bottom: 10px;">📦</div>
        <h2 style="margin:0 0 20px 0;">3D Admin</h2>
        <input id="login-email" type="email" placeholder="Admin email">
        <input id="login-password" type="password" placeholder="Password">
        <button onclick="login()">Enter Dashboard</button>
        <p id="login-error" style="font-size:12px; margin-top:15px; color:var(--danger);"></p>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <h2 style="font-size: 20px; padding-left: 15px; margin-bottom: 40px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">3D WORLD WIDE</h2>
        
        <div class="nav-item active" onclick="showPage('active', this)"><span>🔥</span><p style="margin:0">Active</p></div>
        <div class="nav-item" onclick="showPage('create', this)"><span>➕</span><p style="margin:0">Create</p></div>
        <div class="nav-item" onclick="showPage('completed', this)"><span>✅</span><p style="margin:0">Done</p></div>
        <div class="nav-item" onclick="showPage('delivered', this)"><span>🚚</span><p style="margin:0">Sent</p></div>
        
        <div class="sidebar-spacer" style="flex:1;"></div>
        
        <div class="sidebar-user" style="padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px;">
            <p id="sidebar-user-email" style="font-size:11px; color:var(--text-muted); margin:0; word-break: break-all;"></p>
        </div>
        <div class="nav-item" onclick="logout()" style="color:var(--danger);"><span>🚪</span><p class="logout-text" style="margin:0">Logout</p></div>
    </div>
    <div id="content"><div id="content-inner"></div></div>
</div>

<script>
    const sb = window.supabase.createClient(
        "https://tottpqebhmuaemnngvrz.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdHRwcWViaG11YWVtbm5ndnJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjA4NDAsImV4cCI6MjA5MzIzNjg0MH0.T4tjFt-_QcGlZtA4cfdQDmujWXBA8r9Z4SqeGpJ02hU"
    );

    async function login() {
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) document.getElementById("login-error").innerText = error.message;
        else loadApp();
    }

    async function checkUser() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) loadApp();
    }

    function loadApp() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        sb.auth.getUser().then(({data}) => {
            if(data.user) document.getElementById("sidebar-user-email").innerText = data.user.email;
        });
        showPage('active');
    }

    async function logout() { await sb.auth.signOut(); location.reload(); }

    function showPage(page, el) {
        if (el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if (page === 'create') renderCreateOrder();
        else loadOrders(page.charAt(0).toUpperCase() + page.slice(1));
    }

    function copyID(e, id) {
        e.stopPropagation();
        navigator.clipboard.writeText(id);
        const toast = document.getElementById("toast");
        toast.style.transform = "translateX(-50%) translateY(0)";
        setTimeout(() => { toast.style.transform = "translateX(-50%) translateY(-100px)"; }, 2000);
    }
    
    async function loadOrders(status) {
        const { data } = await sb.from("orders").select("*").eq("status", status).order("created_at", { ascending: false });
        let html = `<h2>${status} Orders</h2>`;
        
        if (!data || data.length === 0) {
            html += `<div style="text-align:center; padding: 60px 0; color:var(--text-muted)"><p>No ${status.toLowerCase()} orders.</p></div>`;
        } else {
            data.forEach(o => {
                const payBadge = o.payment_needed ? `<span class="badge pay-needed">Unpaid</span>` : `<span class="badge pay-ok">Paid</span>`;
                html += `
                    <div class="order-card" onclick="this.querySelector('.order-body').classList.toggle('open')">
                        <div class="order-header">
                            <div>
                                <strong>${o.item_name || 'Item'}</strong> 
                                <span class="id-pill" onclick="copyID(event, '${o.order_id}')">#${o.order_id}</span><br>
                                <small style="color:var(--text-muted)">${o.customer_name}</small>
                            </div>
                            <div>${payBadge}</div>
                        </div>
                        <div class="order-body">
                            <div class="grid-2">
                                <div><small>CONTACT</small><br>${o.customer_email}<br>${o.phone}</div>
                                <div><small>SPECS</small><br>${o.material} - ${o.color}</div>
                            </div>
                            <div style="margin-top:15px; font-size:20px; font-weight:bold; color:var(--success)">$${o.cost}</div>
                            <div style="margin-top:20px;">
                                ${status === 'Active' ? `<button class="btn-action" style="background:var(--accent);" onclick="event.stopPropagation(); updateStatus('${o.id}', 'Completed')">Mark Completed</button>` : ''}
                                ${status === 'Completed' ? `<button class="btn-action" style="background:var(--success);" onclick="event.stopPropagation(); updateStatus('${o.id}', 'Delivered')">Mark Delivered</button>` : ''}
                                <button class="btn-action btn-secondary" onclick="event.stopPropagation(); deleteOrder('${o.id}')">Delete</button>
                            </div>
                        </div>
                    </div>`;
            });
        }
        document.getElementById("content-inner").innerHTML = html;
    }

    function renderCreateOrder() {
        document.getElementById("content-inner").innerHTML = `
            <h2>New Order</h2>
            <div style="background: var(--bg-card); padding: 20px; border-radius: 20px; border: 1px solid var(--border);">
                <div class="grid-2">
                    <input id="item_name" placeholder="Item Name">
                    <input id="name" placeholder="Customer Name">
                </div>
                <div class="grid-2">
                    <input id="email" placeholder="Email">
                    <input id="phone" placeholder="Phone">
                </div>
                <div class="grid-2">
                    <input id="material" placeholder="Material">
                    <input id="color" placeholder="Color">
                </div>
                <input id="cost" type="number" step="0.01" placeholder="Total Cost ($)">
                <textarea id="notes" placeholder="Notes..." rows="3"></textarea>
                <button onclick="createOrder()">Save Order</button>
            </div>`;
    }

    async function createOrder() {
        const order = {
            order_id: Math.floor(100000 + Math.random() * 900000),
            item_name: document.getElementById("item_name").value,
            customer_name: document.getElementById("name").value,
            customer_email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            cost: parseFloat(document.getElementById("cost").value) || 0,
            material: document.getElementById("material").value,
            color: document.getElementById("color").value,
            status: "Active",
            notes: document.getElementById("notes").value
        };
        await sb.from("orders").insert(order);
        showPage('active');
    }

    async function updateStatus(id, newStatus) {
        await sb.from("orders").update({ status: newStatus }).eq("id", id);
        showPage(newStatus.toLowerCase());
    }

    async function deleteOrder(id) {
        if(confirm("Delete order?")) { 
            await sb.from("orders").delete().eq("id", id); 
            showPage('active'); 
        }
    }

    checkUser();
</script>
</body>
</html>
