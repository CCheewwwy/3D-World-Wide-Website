<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D World Wide Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        :root {
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --accent: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #4f46e5, #22c55e);
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --success: #22c55e;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: 0.2s ease; }

        body {
            margin: 0;
            font-family: "Inter", system-ui, sans-serif;
            background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        /* --- LOGIN --- */
        #login-screen {
            display: flex; height: 100vh; align-items: center; justify-content: center;
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.35), transparent 55%), #020617;
        }
        #login-box {
            background: radial-gradient(circle at top, #111827, #020617);
            padding: 35px; border-radius: 18px; width: 360px;
            box-shadow: 0 0 0 1px var(--border), 0 24px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        /* --- FORM ELEMENTS --- */
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 12px; border-radius: 10px;
            border: 1px solid var(--border); background: rgba(15, 23, 42, 0.8);
            color: var(--text-main); font-size: 14px; outline: none;
        }
        .checkbox-container {
            display: flex; align-items: center; gap: 10px; margin-top: 15px;
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px;
        }
        .checkbox-container input { width: auto; margin-top: 0; cursor: pointer; }

        button {
            width: 100%; padding: 12px; margin-top: 20px; background: var(--accent-gradient);
            border: none; color: white; border-radius: 30px; cursor: pointer; font-weight: 600;
        }

        /* --- APP LAYOUT --- */
        #app { display: none; height: 100vh; }
        #sidebar {
            width: 260px; background: #020617; padding: 25px 15px;
            display: flex; flex-direction: column; border-right: 1px solid var(--border);
        }
        .nav-item {
            padding: 12px 15px; cursor: pointer; border-radius: 10px;
            color: var(--text-muted); margin-bottom: 5px; font-size: 14px;
        }
        .nav-item.active { background: rgba(255, 255, 255, 0.08); color: white; }

        #content { flex: 1; padding: 40px; overflow-y: auto; }
        #content-inner { max-width: 900px; margin: 0 auto; }

        /* --- CARDS --- */
        .order-card {
            background: var(--bg-card); border-radius: 14px; padding: 20px;
            margin-bottom: 15px; border: 1px solid var(--border); cursor: pointer;
        }
        .order-header { display: flex; justify-content: space-between; align-items: center; }
        .order-body { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); font-size: 14px; }
        .order-body.open { display: block; animation: slideDown 0.3s ease; }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-active { background: rgba(79, 70, 229, 0.2); color: #818cf8; }
        .pay-needed { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .pay-ok { background: rgba(34, 197, 94, 0.2); color: #4ade80; }

        .btn-action { width: auto; margin-top: 0; margin-right: 8px; padding: 6px 14px; font-size: 12px; display: inline-block; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen">
    <div id="login-box">
        <h2>3D Admin</h2>
        <input id="login-email" type="email" placeholder="Admin email">
        <input id="login-password" type="password" placeholder="Password">
        <button onclick="login()">Sign in</button>
        <p id="login-error"></p>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <h3>3D World Wide</h3>
        <p id="sidebar-user-email" style="font-size:12px; color:var(--text-muted); padding-left:15px;"></p>
        <div class="nav-item active" onclick="showPage('active', this)">Active Orders</div>
        <div class="nav-item" onclick="showPage('create', this)">Create New Order</div>
        <div class="nav-item" onclick="showPage('completed', this)">Completed</div>
        <div class="nav-item" onclick="showPage('delivered', this)">Delivered</div>
        <div style="flex:1"></div>
        <div class="nav-item" onclick="logout()" style="color:var(--danger)">Logout</div>
    </div>
    <div id="content"><div id="content-inner"></div></div>
</div>

<script>
    const sb = window.supabase.createClient(
        "https://tottpqebhmuaemnngvrz.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdHRwcWViaG11YWVtbm5ndnJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjA4NDAsImV4cCI6MjA5MzIzNjg0MH0.T4tjFt-_QcGlZtA4cfdQDmujWXBA8r9Z4SqeGpJ02hU"
    );

    async function login() {
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { document.getElementById("login-error").innerText = "Error: " + error.message; } 
        else { loadApp(); }
    }

    async function logout() { await sb.auth.signOut(); location.reload(); }

    function loadApp() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        sb.auth.getUser().then(({data}) => { if(data.user) document.getElementById("sidebar-user-email").innerText = data.user.email; });
        showPage('active');
    }

    function showPage(page, el) {
        if (el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        if (page === 'create') renderCreateOrder();
        else loadOrders(page.charAt(0).toUpperCase() + page.slice(1));
    }

    async function loadOrders(status) {
        const { data } = await sb.from("orders").select("*").eq("status", status).order("created_at", { ascending: false });
        let html = `<h2>${status} Orders</h2>`;
        data?.forEach(o => {
            const paymentBadge = o.payment_needed ? `<span class="badge pay-needed">UNPAID</span>` : `<span class="badge pay-ok">PAID</span>`;
            html += `
                <div class="order-card" onclick="this.querySelector('.order-body').classList.toggle('open')">
                    <div class="order-header">
                        <div>
                            <strong style="font-size:18px;">${o.item_name}</strong> ${paymentBadge}<br>
                            <span style="font-size:13px; color:var(--text-muted)">Customer: ${o.customer_name} | Cost: $${o.cost || 0}</span>
                        </div>
                        <span class="badge status-active">${o.status}</span>
                    </div>
                    <div class="order-body">
                        <p><strong>Contact:</strong> ${o.customer_email} | ${o.phone}</p>
                        <p><strong>Details:</strong> ${o.material} - ${o.color} (Qty: ${o.quantity})</p>
                        <p><strong>Notes:</strong> ${o.notes || "None"}</p>
                        <div style="margin-top:10px">
                            ${status === 'Active' ? `<button class="btn-action" onclick="event.stopPropagation(); updateStatus('${o.id}', 'Completed')">Complete</button>` : ''}
                            ${o.payment_needed ? `<button class="btn-action" style="background:var(--success); color:white" onclick="event.stopPropagation(); markAsPaid('${o.id}')">Mark as Paid</button>` : ''}
                            <button class="btn-action" style="background:rgba(239,68,68,0.2); color:#fca5a5" onclick="event.stopPropagation(); deleteOrder('${o.id}')">Delete</button>
                        </div>
                    </div>
                </div>`;
        });
        document.getElementById("content-inner").innerHTML = html || "No orders.";
    }

    function renderCreateOrder() {
        document.getElementById("content-inner").innerHTML = `
            <h2>Create New Order</h2>
            <div style="background: var(--bg-card); padding: 25px; border-radius: 14px; border: 1px solid var(--border);">
                <input id="item_name" placeholder="Item Name">
                <input id="name" placeholder="Customer Name">
                <div style="display:flex; gap:10px;">
                    <input id="cost" type="number" step="0.01" placeholder="Cost ($)">
                    <div class="checkbox-container">
                        <input type="checkbox" id="payment_needed" checked>
                        <label for="payment_needed" style="font-size:13px;">Payment Needed?</label>
                    </div>
                </div>
                <div style="display:flex; gap:10px;">
                    <input id="email" placeholder="Email">
                    <input id="phone" placeholder="Phone">
                </div>
                <div style="display:flex; gap:10px;">
                    <input id="material" placeholder="Material">
                    <input id="color" placeholder="Color">
                </div>
                <input id="quantity" type="number" value="1">
                <select id="priority"><option>Normal</option><option>High</option></select>
                <textarea id="notes" placeholder="Notes" rows="3"></textarea>
                <button onclick="createOrder()">Submit Order</button>
            </div>`;
    }

    async function createOrder() {
        const order = {
            item_name: document.getElementById("item_name").value,
            customer_name: document.getElementById("name").value,
            cost: parseFloat(document.getElementById("cost").value) || 0,
            payment_needed: document.getElementById("payment_needed").checked,
            customer_email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            material: document.getElementById("material").value,
            color: document.getElementById("color").value,
            quantity: parseInt(document.getElementById("quantity").value),
            priority: document.getElementById("priority").value,
            status: "Active",
            notes: document.getElementById("notes").value
        };
        const { error } = await sb.from("orders").insert(order);
        if(!error) showPage('active'); else alert(error.message);
    }

    async function updateStatus(id, newStatus) {
        await sb.from("orders").update({ status: newStatus }).eq("id", id);
        showPage(newStatus.toLowerCase());
    }

    async function markAsPaid(id) {
        await sb.from("orders").update({ payment_needed: false }).eq("id", id);
        showPage('active');
    }

    async function deleteOrder(id) {
        if(confirm("Delete?")) { await sb.from("orders").delete().eq("id", id); showPage('active'); }
    }

    sb.auth.getSession().then(({ data }) => { if (data.session) loadApp(); });
</script>
</body>
</html>
