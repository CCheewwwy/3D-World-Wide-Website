<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D World Wide Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
    }

    /* LOGIN SCREEN */
    #login-screen {
        display: flex;
        height: 100vh;
        align-items: center;
        justify-content: center;
        background: #111;
        color: white;
    }
    #login-box {
        background: #1c1c1c;
        padding: 30px;
        border-radius: 10px;
        width: 300px;
    }
    #login-box input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 5px;
        border: none;
    }
    #login-box button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background: #4CAF50;
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    /* DASHBOARD LAYOUT */
    #app {
        display: none;
        height: 100vh;
        display: flex;
    }

    /* SIDEBAR */
    #sidebar {
        width: 240px;
        background: #1a1a1a;
        color: white;
        padding-top: 20px;
    }
    #sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
    }
    .nav-item {
        padding: 15px 20px;
        cursor: pointer;
        border-bottom: 1px solid #333;
    }
    .nav-item:hover {
        background: #333;
    }

    /* MAIN CONTENT */
    #content {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
    }

    /* FORMS */
    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    button {
        padding: 10px 15px;
        background: #4CAF50;
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    /* TABLES */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }
    table th, table td {
        padding: 12px;
        border-bottom: 1px solid #ccc;
    }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
    <div id="login-box">
        <h2>Admin Login</h2>
        <input id="login-email" type="email" placeholder="Email">
        <input id="login-password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="login-error" style="color:red;"></p>
    </div>
</div>

<!-- APP -->
<div id="app">
    <div id="sidebar">
        <h2>3D Admin</h2>
        <div class="nav-item" onclick="showPage('create')">Create Order</div>
        <div class="nav-item" onclick="showPage('active')">Active Orders</div>
        <div class="nav-item" onclick="showPage('completed')">Completed Orders</div>
        <div class="nav-item" onclick="showPage('delivered')">Delivered Orders</div>
        <div class="nav-item" onclick="logout()">Logout</div>
    </div>

    <div id="content">
        <!-- Pages will be injected here -->
    </div>
</div>

<script>
/* INIT SUPABASE */
const supabase = supabase.createClient(
    "https://tottpqebhmuaemnngvrz.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdHRwcWViaG11YWVtbm5ndnJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjA4NDAsImV4cCI6MjA5MzIzNjg0MH0.T4tjFt-_QcGlZtA4cfdQDmujWXBA8r9Z4SqeGpJ02hU"
);

/* LOGIN */
async function login() {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
        document.getElementById("login-error").innerText = "Invalid login.";
    } else {
        loadApp();
    }
}

/* LOGOUT */
async function logout() {
    await supabase.auth.signOut();
    location.reload();
}

/* SESSION CHECK */
supabase.auth.getSession().then(({ data }) => {
    if (data.session) loadApp();
});

/* LOAD APP */
function loadApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    showPage("active");
}

/* PAGE SWITCHER */
function showPage(page) {
    if (page === "create") renderCreateOrder();
    if (page === "active") loadOrders("Active");
    if (page === "completed") loadOrders("Completed");
    if (page === "delivered") loadOrders("Delivered");
}

/* CREATE ORDER PAGE */
function renderCreateOrder() {
    document.getElementById("content").innerHTML = `
        <h2>Create Order</h2>
        <input id="name" placeholder="Customer Name">
        <input id="email" placeholder="Customer Email">
        <input id="phone" placeholder="Phone">
        <input id="material" placeholder="Material">
        <input id="color" placeholder="Color">
        <input id="quantity" type="number" placeholder="Quantity">
        <select id="priority">
            <option>Normal</option>
            <option>High</option>
        </select>
        <textarea id="notes" placeholder="Notes"></textarea>
        <button onclick="createOrder()">Submit Order</button>
    `;
}

/* CREATE ORDER */
async function createOrder() {
    const order = {
        customer_name: document.getElementById("name").value,
        customer_email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        material: document.getElementById("material").value,
        color: document.getElementById("color").value,
        quantity: parseInt(document.getElementById("quantity").value),
        priority: document.getElementById("priority").value,
        status: "Active",
        notes: document.getElementById("notes").value,
        rush: false
    };

    await supabase.from("orders").insert(order);
    alert("Order created!");
    showPage("active");
}

/* LOAD ORDERS */
async function loadOrders(status) {
    const { data } = await supabase
        .from("orders")
        .select("*")
        .eq("status", status)
        .order("created_at", { ascending: false });

    let html = `<h2>${status} Orders</h2><table><tr>
        <th>Name</th><th>Material</th><th>Qty</th><th>Status</th><th>Actions</th>
    </tr>`;

    data.forEach(o => {
        html += `
            <tr>
                <td>${o.customer_name}</td>
                <td>${o.material}</td>
                <td>${o.quantity}</td>
                <td>${o.status}</td>
                <td>
                    ${status !== "Completed" ? `<button onclick="markCompleted('${o.id}')">Complete</button>` : ""}
                    ${status !== "Delivered" ? `<button onclick="markDelivered('${o.id}')">Deliver</button>` : ""}
                </td>
            </tr>
        `;
    });

    html += "</table>";
    document.getElementById("content").innerHTML = html;
}

/* MARK COMPLETED */
async function markCompleted(id) {
    await supabase.from("orders").update({ status: "Completed" }).eq("id", id);
    showPage("completed");
}

/* MARK DELIVERED */
async function markDelivered(id) {
    const deliveredAt = new Date();
    const autoDeleteAt = new Date(deliveredAt.getTime() + 7 * 24 * 60 * 60 * 1000);

    await supabase.from("orders").update({
        status: "Delivered",
        delivered_at: deliveredAt.toISOString(),
        auto_delete_at: autoDeleteAt.toISOString()
    }).eq("id", id);

    showPage("delivered");
}
</script>

</body>
</html>
